"$schema" = 'https://starship.rs/config-schema.json'

palette = "rose-pine-moon"
add_newline = false

format = """
$os\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
$package\
$cmd_duration\
$line_break\
$character\
"""

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:gold)'
error_symbol = '[❯](bold fg:love)'

[cmd_duration]
min_time = 2000
format = '[ 󱫑 $duration ]($style)'
style = 'fg:foam'
show_milliseconds = false
disabled = false

[os]
disabled = false
style = "fg:gold"
format = '[$symbol]($style)'

[os.symbols]
NixOS = "󱄅 "

[directory]
style = "fg:foam"
read_only_style = "fg:rose"
repo_root_style = "bold fg:gold"
format = "[ $path ]($style)"
read_only = "  "
home_symbol = "~"
truncation_symbol = " "
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true

[git_branch]
symbol = " "
style = "fg:iris"
format = '[( $symbol $branch )]($style)'
only_attached = true
ignore_branches = []
truncation_length = 25
truncation_symbol = "..."
always_show_remote = false
disabled = false

[git_commit]
style = "fg:iris"
format = "[(( $tag)( @$hash) )]($style)"
commit_hash_length = 7
only_detached = true
tag_symbol = "󰓼 "
tag_disabled = false
disabled = false

[git_status]
style = "fg:iris"
format = '[($ahead_behind )($all_status )]($style)'
stashed = "[$count](fg:iris)"
ahead = "⇡${count}"
behind = "⇣${count}"
up_to_date = ""
diverged = "⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
deleted = "×${count}"
renamed = "»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
ignore_submodules = false
disabled = false

[git_metrics]
format = '[(([+$added]($added_style))([-$deleted]($deleted_style)) )](fg:foam)'
added_style = "fg:rose"
deleted_style = "fg:rose"
only_nonzero_diffs = true
disabled = false

[git_state]
style = "fg:rose"
format = '[($state( $progress_current/$progress_total) )]($style bold)'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

[package]
disabled = false
style = 'fg:iris'
symbol = " "
format = '[( $symbol( $version) )]($style)'

[sudo]
disabled = true
